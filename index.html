<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Модерация приложений</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Кастомный правый скроллбар */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
            background-color: transparent;
        }

        ::-webkit-scrollbar-track {
            background-color: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background-color: #243143;
            border-radius: 10px;
        }

        body {
            background-color: #0e1621;
            color: #ffffff;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background-color: #17212b;
            padding: 20px;
            border-radius: 26px; /* Скругление 45% от макс */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        /* Пропорции окон: Левое и правое одинаковые, центральное чуть больше */
        .form-row .group-num {
            flex: 1;
            min-width: 0;
        }

        .form-row .group-select {
            flex: 1.3;
            min-width: 0;
        }

        .form-row .group-bundle {
            flex: 1;
            min-width: 0;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: bold;
            color: #3b88c3;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            background-color: #101721;
            border: 1px solid #243143;
            border-radius: 16px; /* Скругление инпутов */
            padding: 12px 16px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237993b0' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 14px;
            padding-right: 32px;
            cursor: pointer;
        }

        input:focus, select:focus {
            border-color: #3b88c3;
        }

        input::placeholder {
            color: #52667a;
        }

        .btn-primary {
            width: 100%;
            background-color: #2481cc;
            color: #ffffff;
            border: none;
            border-radius: 16px;
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 15px;
        }

        .btn-primary:hover {
            background-color: #2a96e8;
        }

        .backup-zone {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-backup {
            flex: 1;
            background-color: #243143;
            color: #7993b0;
            border: 1px solid #2b394a;
            border-radius: 12px;
            padding: 8px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-backup:hover {
            background-color: #2f3f54;
            color: #fff;
        }

        .controls-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 10px;
            padding-bottom: 15px;
            border-bottom: 1px solid #243143;
        }

        .panel-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 32px;
        }

        .total-badge {
            font-size: 13px;
            font-weight: bold;
            color: #7993b0;
        }

        .total-badge span {
            color: #2481cc;
        }

        .btn-danger-bulk {
            background-color: #ca3a3a;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
            font-weight: bold;
            display: none;
        }

        .btn-danger-bulk:hover {
            background-color: #e54343;
        }

        .list-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
            max-height: 65vh;
            overflow-y: auto;
            padding-right: 8px;
        }

        /* Стили для заголовков раскрывающихся списков */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1a242f;
            padding: 12px 16px;
            border-radius: 14px;
            cursor: pointer;
            margin-top: 8px;
            user-select: none;
            border: 1px solid #243143;
            transition: background-color 0.2s;
        }

        .section-header:hover {
            background-color: #202b3a;
        }

        .section-title {
            font-size: 12px;
            font-weight: bold;
            color: #3b88c3;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .section-arrow {
            font-size: 12px;
            color: #7993b0;
            transition: transform 0.2s ease;
        }

        .section-header.collapsed .section-arrow {
            transform: rotate(-90deg);
        }

        .section-content {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 5px;
            margin-bottom: 10px;
        }

        .section-content.collapsed {
            display: none;
        }

        /* Стили карточек приложений */
        .item-card {
            background-color: #24303f;
            border-radius: 22px; /* Красивые круглые углы */
            padding: 14px 16px;
            display: flex;
            align-items: center; /* Центрирование абсолютно всех элементов */
            gap: 14px;
        }

        .item-card.active-clicked {
            background-color: #111822 !important;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            align-self: center; /* Жесткое центрирование */
        }

        .checkbox-container input {
            display: none;
        }

        .custom-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #52667a;
            border-radius: 50%;
            display: block;
            background-color: #101721;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .checkbox-container input:checked + .custom-checkbox {
            background-color: #2ecc71;
            border-color: #2ecc71;
        }

        .item-link-wrapper {
            flex: 1;
            display: flex;
            align-items: center; /* Центрирование контента внутри ссылки */
            text-decoration: none;
            color: inherit;
            min-width: 0;
        }

        .item-num {
            color: #4f9fdd;
            font-weight: bold;
            font-size: 14px;
            white-space: nowrap;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            align-self: center; /* Жесткое центрирование */
        }

        .item-text-center {
            flex: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 6px; /* Чуть увеличенный зазор между названием и бандлом */
            padding: 0 15px;
            min-width: 0;
        }

        .item-name {
            font-weight: 600;
            font-size: 15px;
            color: #ffffff;
            word-break: break-word;
            line-height: 1.2;
        }

        .item-bundle {
            font-size: 13px; /* Крупнее, как просил */
            color: #8ea3b8; /* Более контрастный и заметный цвет */
            word-break: break-word;
            line-height: 1.2;
        }

        .item-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
            align-items: center;
            align-self: center; /* Жесткое центрирование */
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        .btn-edit { color: #3b88c3; }
        .btn-edit:hover { background-color: rgba(59, 136, 195, 0.15); }
        .btn-delete { color: #e54343; }
        .btn-delete:hover { background-color: rgba(229, 67, 67, 0.15); }

        .empty-mock {
            text-align: center;
            color: #52667a;
            font-size: 13px;
            padding: 15px 0;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-group">
        <label for="appName">Название / Умная вставка</label>
        <input type="text" id="appName" placeholder="Вставь строку или имя">
    </div>

    <div class="form-row">
        <div class="group-num">
            <label for="appNumber">№</label>
            <input type="text" id="appNumber" placeholder="25">
        </div>
        <div class="group-select">
            <label for="appListType">Список</label>
            <select id="appListType">
                <option value="moderation">moderation</option>
                <option value="update">update</option>
                <option value="design">design</option>
            </select>
        </div>
        <div class="group-bundle">
            <label for="appBundle">Бандл</label>
            <input type="text" id="appBundle" placeholder="com.company.app">
        </div>
    </div>

    <button id="addBtn" class="btn-primary">Добавить в список</button>

    <div class="backup-zone">
        <button id="exportBtn" class="btn-backup">📤 СКОПИРОВАТЬ БАЗУ</button>
        <button id="importBtn" class="btn-backup">📥 ВОССТАНОВИТЬ БАЗУ</button>
    </div>

    <div class="controls-panel">
        <div class="panel-top">
            <div class="total-badge">ВСЕГО <span id="totalCount">0</span></div>
            <button id="deleteSelectedBtn" class="btn-danger-bulk">Удалить выбранные (0)</button>
        </div>
        <div class="search-wrapper">
            <input type="text" id="searchBar" placeholder="🔍 Поиск по номеру, имени или бандлу...">
        </div>
    </div>

    <div id="listContainer" class="list-container">
        </div>
</div>

<script>
    let appList = JSON.parse(localStorage.getItem('moderation_apps')) || [];
    let selectedIds = new Set();
    let editingId = null;
    let activeCardId = null;

    // Хранение состояния раскрытых списков (по умолчанию все раскрыты)
    let collapsedSections = JSON.parse(localStorage.getItem('collapsed_sections')) || {
        moderation: false,
        update: false,
        design: false
    };

    const appNameInput = document.getElementById('appName');
    const appNumberInput = document.getElementById('appNumber');
    const appListTypeInput = document.getElementById('appListType');
    const appBundleInput = document.getElementById('appBundle');
    const addBtn = document.getElementById('addBtn');
    const searchBar = document.getElementById('searchBar');
    const listContainer = document.getElementById('listContainer');
    const totalCountSpan = document.getElementById('totalCount');
    const deleteSelectedBtn = document.getElementById('deleteSelectedBtn');
    const exportBtn = document.getElementById('exportBtn');
    const importBtn = document.getElementById('importBtn');

    [appNameInput, appNumberInput, appBundleInput].forEach(input => {
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addBtn.click();
            }
        });
    });

    // Умный парсер вставки строк
    appNameInput.addEventListener('input', (e) => {
        let val = e.target.value.replace(/\r?\n|\r/g, ' ').trim();
        const bundleRegex = /([a-zA-Z0-9_-]+\.[a-zA-Z0-9._-]+)/;
        const bundleMatch = val.match(bundleRegex);
        
        let numMatch = val.match(/^#?(\d+)/);
        if (!numMatch) {
            numMatch = val.match(/\b(\d+)\b/);
        }
        
        if (numMatch && bundleMatch) {
            const num = numMatch[1];
            const bundle = bundleMatch[1].trim();
            
            let name = val;
            name = name.replace(numMatch[0], '');
            name = name.replace(bundle, '');
            name = name.replace(/[|#]/g, ' ');
            name = name.replace(/\s+/g, ' ').trim();
            
            appNumberInput.value = num;
            appBundleInput.value = bundle;
            appNameInput.value = name;
        }
    });

    // Экспорт с учетом выбранного списка
    exportBtn.addEventListener('click', () => {
        if (appList.length === 0) {
            alert('Список пуст, экспортировать нечего!');
            return;
        }
        const compactLines = appList.map(app => `${app.number || ''};;${app.name};;${app.bundle};;${app.listType || 'moderation'}`);
        const compactString = compactLines.join('\n');
        
        navigator.clipboard.writeText(compactString).then(() => {
            alert(`База успешно экспортирована и скопирована в буфер!`);
        }).catch(err => {
            alert('Ошибка буфера. Скопируй вручную из окна:\n\n' + compactString);
        });
    });

    // Импорт с поддержкой старого и нового форматов
    importBtn.addEventListener('click', () => {
        const str = prompt('Вставь текст бэкапа:');
        if (!str || !str.trim()) return;
        
        try {
            const lines = str.trim().split('\n');
            const parsedList = lines.map((line, index) => {
                const parts = line.split(';;');
                if (parts.length < 3) throw new Error();
                return {
                    id: (Date.now() + index).toString(),
                    number: parts[0].trim(),
                    name: parts[1].trim(),
                    bundle: parts[2].trim(),
                    listType: parts[3] ? parts[3].trim() : 'moderation' // Старые бэкапы падают в moderation
                };
            });
            
            if (parsedList.length > 0) {
                appList = parsedList;
                selectedIds.clear();
                activeCardId = null;
                saveAndRefresh();
                alert('База успешно восстановлена!');
            }
        } catch (e) {
            alert('Неверный формат данных бэкапа!');
        }
    });

    // МГНОВЕННЫЙ ХЕНДЛЕР НА НАЖАТИЕ ЛКМ ИЛИ КОЛЕСИКА МЫШИ (auxclick / mousedown)
    document.addEventListener('mousedown', (e) => {
        // e.button === 0 (ЛКМ), e.button === 1 (Колёсико мыши)
        if (e.button !== 0 && e.button !== 1) return;

        const linkWrapper = e.target.closest('.item-link-wrapper');
        const actionBtn = e.target.closest('.action-btn');
        const checkbox = e.target.closest('.checkbox-container');
        const backupBtn = e.target.closest('.btn-backup');
        const primaryBtn = e.target.closest('.btn-primary');
        const inputField = e.target.closest('input');
        const selectField = e.target.closest('select');
        const sectionHeader = e.target.closest('.section-header');

        if (linkWrapper) {
            const id = linkWrapper.getAttribute('data-id');
            if (activeCardId) {
                const oldCard = document.querySelector(`.item-card[data-id="${activeCardId}"]`);
                if (oldCard) oldCard.classList.remove('active-clicked');
            }
            activeCardId = id;
            const newCard = linkWrapper.closest('.item-card');
            if (newCard) {
                newCard.classList.add('active-clicked');
            }
        } else if (!actionBtn && !checkbox && !backupBtn && !primaryBtn && !inputField && !selectField && !sectionHeader) {
            // Если кликнули мимо всего важного, сбрасываем серый фокус
            if (activeCardId) {
                const oldCard = document.querySelector(`.item-card[data-id="${activeCardId}"]`);
                if (oldCard) oldCard.classList.remove('active-clicked');
                activeCardId = null;
            }
        }
    });

    // Функция переключения видимости секции списков
    window.toggleSection = function(sectionName) {
        collapsedSections[sectionName] = !collapsedSections[sectionName];
        localStorage.setItem('collapsed_sections', JSON.stringify(collapsedSections));
        renderList();
    };

    function renderList() {
        listContainer.innerHTML = '';
        const searchKeyword = searchBar.value.toLowerCase().trim();

        // Фильтруем весь массив по поисковому слову
        const filteredApps = appList.filter(app => {
            return (app.name.toLowerCase().includes(searchKeyword) ||
                    app.number.toLowerCase().includes(searchKeyword) ||
                    app.bundle.toLowerCase().includes(searchKeyword));
        });

        totalCountSpan.textContent = filteredApps.length;

        // Создаем три предопределенные категории
        const categories = ['moderation', 'update', 'design'];

        categories.forEach(cat => {
            // Берем элементы текущей категории и переворачиваем, чтобы новые были сверху
            const catApps = filteredApps.filter(app => (app.listType || 'moderation') === cat);
            const displayedApps = [...catApps].reverse();

            const isCollapsed = collapsedSections[cat];

            // Создаем заголовок секции
            const header = document.createElement('div');
            header.className = `section-header ${isCollapsed ? 'collapsed' : ''}`;
            header.setAttribute('onclick', `toggleSection('${cat}')`);
            header.innerHTML = `
                <span class="section-title">${cat} (<span class="section-count">${catApps.length}</span>)</span>
                <span class="section-arrow">▼</span>
            `;
            listContainer.appendChild(header);

            // Создаем контейнер для карточек внутри секции
            const contentDiv = document.createElement('div');
            contentDiv.className = `section-content ${isCollapsed ? 'collapsed' : ''}`;
            contentDiv.id = `section-${cat}`;

            if (displayedApps.length === 0) {
                contentDiv.innerHTML = '<div class="empty-mock">Список пуст</div>';
            } else {
                displayedApps.forEach(app => {
                    const isChecked = selectedIds.has(app.id);
                    const isActive = (app.id === activeCardId);

                    const card = document.createElement('div');
                    card.className = `item-card ${isActive ? 'active-clicked' : ''}`;
                    card.setAttribute('data-id', app.id);
                    card.innerHTML = `
                        <label class="checkbox-container">
                            <input type="checkbox" class="item-checkbox" data-id="${app.id}" ${isChecked ? 'checked' : ''}>
                            <span class="custom-checkbox"></span>
                        </label>
                        
                        <a href="https://play.google.com/store/apps/details?id=${app.bundle}" target="_blank" class="item-link-wrapper" data-id="${app.id}">
                            <span class="item-num">${app.number ? '#' + app.number : '#__'}</span>
                            <div class="item-text-center">
                                <span class="item-name">${app.name}</span>
                                <span class="item-bundle">${app.bundle || 'нет бандла'}</span>
                            </div>
                        </a>
                        
                        <div class="item-actions">
                            <button class="action-btn btn-edit" onclick="editItem('${app.id}')">
                                <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l10-10zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207 11.207 2.5zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293l6.5-6.5zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325z"/></svg>
                            </button>
                            <button class="action-btn btn-delete" onclick="deleteItem('${app.id}')">
                                <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/><path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/></svg>
                            </button>
                        </div>
                    `;
                    contentDiv.appendChild(card);
                });
            }
            listContainer.appendChild(contentDiv);
        });

        updateBulkButtonsVisibility(filteredApps);
    }

    // Отслеживание чекбоксов массового удаления
    listContainer.addEventListener('change', (e) => {
        if (e.target.classList.contains('item-checkbox')) {
            const id = e.target.getAttribute('data-id');
            if (e.target.checked) {
                selectedIds.add(id);
            } else {
                selectedIds.delete(id);
            }
            const currentFilteredCount = appList.filter(app => {
                const keyword = searchBar.value.toLowerCase().trim();
                return app.name.toLowerCase().includes(keyword) || app.number.toLowerCase().includes(keyword) || app.bundle.toLowerCase().includes(keyword);
            });
            updateBulkButtonsVisibility(currentFilteredCount);
        }
    });

    function updateBulkButtonsVisibility(currentFilteredApps) {
        const selectedFilteredCount = currentFilteredApps.filter(app => selectedIds.has(app.id)).length;
        if (selectedFilteredCount > 0) {
            deleteSelectedBtn.style.display = 'block';
            deleteSelectedBtn.textContent = `Удалить выбранные (${selectedFilteredCount})`;
        } else {
            deleteSelectedBtn.style.display = 'none';
        }
    }

    deleteSelectedBtn.addEventListener('click', () => {
        if (confirm(`Удалить выбранные элементы (${selectedIds.size} шт.)?`)) {
            appList = appList.filter(app => !selectedIds.has(app.id));
            if (selectedIds.has(activeCardId)) activeCardId = null;
            selectedIds.clear();
            saveAndRefresh();
        }
    });

    // Добавление / Сохранение изменений
    addBtn.addEventListener('click', () => {
        const name = appNameInput.value.trim();
        const number = appNumberInput.value.trim();
        const listType = appListTypeInput.value;
        const bundle = appBundleInput.value.trim();

        if (!name) {
            alert('Поле названия не должно быть пустым!');
            return;
        }
        if (!bundle) {
            alert('Поле бандла не должно быть пустым!');
            return;
        }

        const isDuplicateBundle = appList.some(app => app.bundle.toLowerCase() === bundle.toLowerCase() && app.id !== editingId);
        if (isDuplicateBundle) {
            alert(`Ошибка: Приложение с бандлом "${bundle}" уже добавлено в список!`);
            return;
        }

        if (editingId) {
            appList = appList.map(app => app.id === editingId ? { ...app, name, number, bundle, listType } : app);
            editingId = null;
            addBtn.textContent = 'Добавить в список';
            addBtn.style.backgroundColor = '#2481cc';
        } else {
            const newApp = {
                id: Date.now().toString(),
                name,
                number,
                bundle,
                listType
            };
            appList.push(newApp);
        }

        appNameInput.value = '';
        appNumberInput.value = '';
        appBundleInput.value = '';
        saveAndRefresh();
    });

    window.editItem = function(id) {
        const item = appList.find(app => app.id === id);
        if (item) {
            appNameInput.value = item.name;
            appNumberInput.value = item.number;
            appBundleInput.value = item.bundle;
            appListTypeInput.value = item.listType || 'moderation';
            editingId = id;
            addBtn.textContent = 'Сохранить изменения';
            addBtn.style.backgroundColor = '#e5a93c';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    };

    window.deleteItem = function(id) {
        appList = appList.filter(app => app.id !== id);
        selectedIds.delete(id);
        if (activeCardId === id) activeCardId = null;
        if (editingId === id) {
            editingId = null;
            addBtn.textContent = 'Добавить в список';
            addBtn.style.backgroundColor = '#2481cc';
            appNameInput.value = '';
            appNumberInput.value = '';
            appBundleInput.value = '';
        }
        saveAndRefresh();
    };

    searchBar.addEventListener('input', renderList);

    function saveAndRefresh() {
        localStorage.setItem('moderation_apps', JSON.stringify(appList));
        renderList();
    }

    // Первый запуск рендера
    renderList();
</script>

</body>
</html>
