<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Модерация приложений</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0e1621;
            color: #ffffff;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background-color: #17212b;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .form-row .group-num {
            flex: 0 0 25%;
        }

        .form-row .group-bundle {
            flex: 1;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: bold;
            color: #3b88c3;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            background-color: #101721;
            border: 1px solid #243143;
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #3b88c3;
        }

        input::placeholder {
            color: #52667a;
        }

        .btn-primary {
            width: 100%;
            background-color: #2481cc;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 15px;
        }

        .btn-primary:hover {
            background-color: #2a96e8;
        }

        /* КНОПКИ РЕЗЕРВНОГО КОПИРОВАНИЯ */
        .backup-zone {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-backup {
            flex: 1;
            background-color: #243143;
            color: #7993b0;
            border: 1px solid #2b394a;
            border-radius: 8px;
            padding: 8px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-backup:hover {
            background-color: #2f3f54;
            color: #fff;
        }

        .controls-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #243143;
        }

        .panel-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 32px;
        }

        .total-badge {
            font-size: 13px;
            font-weight: bold;
            color: #7993b0;
        }

        .total-badge span {
            color: #2481cc;
        }

        .search-wrapper {
            width: 100%;
        }

        .btn-danger-bulk {
            background-color: #ca3a3a;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
            font-weight: bold;
            display: none;
        }

        .btn-danger-bulk:hover {
            background-color: #e54343;
        }

        /* СПИСОК И НАСТРОЙКА СКРОЛЛБАРА */
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 65vh;
            overflow-y: auto;
            padding-right: 2px;
        }

        .list-container::-webkit-scrollbar {
            width: 5px;
            background-color: transparent;
        }

        .list-container::-webkit-scrollbar-track {
            background-color: transparent;
        }

        .list-container::-webkit-scrollbar-thumb {
            background-color: #243143;
            border-radius: 10px;
        }

        .list-container::-webkit-scrollbar-button {
            display: none;
        }

        /* КАРТОЧКА И АНИМАЦИЯ ЗАТУХАНИЯ КЛИКА */
        .item-card {
            background-color: #24303f;
            border-radius: 10px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        @keyframes clickFadeGradient {
            0% { background-color: #111822; }
            100% { background-color: #24303f; }
        }

        .item-card.recently-clicked {
            animation: clickFadeGradient 5s ease-out forwards;
        }

        /* ВЫРАВНИВАНИЕ */
        .checkbox-container {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            height: 100%;
        }

        .checkbox-container input {
            display: none;
        }

        .custom-checkbox {
            width: 18px;
            height: 18px;
            border: 2px solid #52667a;
            border-radius: 4px;
            display: block;
            position: relative;
            background-color: #101721;
        }

        .checkbox-container input:checked + .custom-checkbox {
            background-color: #2481cc;
            border-color: #2481cc;
        }

        .checkbox-container input:checked + .custom-checkbox::after {
            content: "";
            position: absolute;
            left: 4px;
            top: 1px;
            width: 4px;
            height: 8px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .item-link-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: inherit;
            min-width: 0;
        }

        .item-num {
            color: #4f9fdd;
            font-weight: bold;
            font-size: 14px;
            white-space: nowrap;
            flex-shrink: 0;
            display: flex;
            align-items: center;
        }

        .item-text-center {
            flex: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 0 15px;
            min-width: 0;
        }

        .item-name {
            font-weight: 600;
            font-size: 14px;
            color: #ffffff;
            word-break: break-word;
        }

        .item-bundle {
            font-size: 11px;
            color: #7993b0;
            word-break: break-word;
        }

        .item-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        .btn-edit { color: #3b88c3; }
        .btn-edit:hover { background-color: rgba(59, 136, 195, 0.15); }
        .btn-delete { color: #e54343; }
        .btn-delete:hover { background-color: rgba(229, 67, 67, 0.15); }

        .empty-mock {
            text-align: center;
            color: #52667a;
            font-size: 13px;
            padding: 20px 0;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-group">
        <label for="appName">Название / Умная вставка</label>
        <input type="text" id="appName" placeholder="Вставь строку или имя">
    </div>

    <div class="form-row">
        <div class="group-num">
            <label for="appNumber">№</label>
            <input type="text" id="appNumber" placeholder="25">
        </div>
        <div class="group-bundle">
            <label for="appBundle">Бандл</label>
            <input type="text" id="appBundle" placeholder="com.company.app">
        </div>
    </div>

    <button id="addBtn" class="btn-primary">Добавить в список</button>

    <div class="backup-zone">
        <button id="exportBtn" class="btn-backup">📤 СКОПИРОВАТЬ БАЗУ</button>
        <button id="importBtn" class="btn-backup">📥 ВОССТАНОВИТЬ БАЗУ</button>
    </div>

    <div class="controls-panel">
        <div class="panel-top">
            <div class="total-badge">ВСЕГО <span id="totalCount">0</span></div>
            <button id="deleteSelectedBtn" class="btn-danger-bulk">Удалить выбранные (0)</button>
        </div>
        <div class="search-wrapper">
            <input type="text" id="searchBar" placeholder="🔍 Поиск по номеру, имени или бандлу...">
        </div>
    </div>

    <div id="listContainer" class="list-container"></div>
</div>

<script>
    let appList = JSON.parse(localStorage.getItem('moderation_apps')) || [];
    let selectedIds = new Set();
    let editingId = null;

    const appNameInput = document.getElementById('appName');
    const appNumberInput = document.getElementById('appNumber');
    const appBundleInput = document.getElementById('appBundle');
    const addBtn = document.getElementById('addBtn');
    const searchBar = document.getElementById('searchBar');
    const listContainer = document.getElementById('listContainer');
    const totalCountSpan = document.getElementById('totalCount');
    const deleteSelectedBtn = document.getElementById('deleteSelectedBtn');
    const exportBtn = document.getElementById('exportBtn');
    const importBtn = document.getElementById('importBtn');

    [appNameInput, appNumberInput, appBundleInput].forEach(input => {
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addBtn.click();
            }
        });
    });

    // ПАРСЕР
    appNameInput.addEventListener('input', (e) => {
        let val = e.target.value.replace(/\r?\n|\r/g, ' ').trim();
        
        const numMatch = val.match(/^#?(\d+)/);
        const bundleMatch = val.match(/([a-zA-Z0-9_-]+\.[a-zA-Z0-9._-]+)/g);
        
        if (numMatch && bundleMatch && bundleMatch.length > 0) {
            const num = numMatch[1];
            const bundle = bundleMatch[bundleMatch.length - 1].trim();
            
            let namePart = val.substring(numMatch[0].length);
            
            const bundleIndex = namePart.lastIndexOf(bundle);
            if (bundleIndex !== -1) {
                namePart = namePart.substring(0, bundleIndex);
            }
            
            const name = namePart.replace(/^[\s|]+|[\s|]+$/g, '').trim();
            
            appNumberInput.value = num;
            appBundleInput.value = bundle;
            appNameInput.value = name;
        }
    });

    // ЛОГИКА ЭКСПОРТА (Копирует в буфер обмена)
    exportBtn.addEventListener('click', () => {
        if (appList.length === 0) {
            alert('Список пуст, экспортировать нечего!');
            return;
        }
        const base64Data = btoa(unescape(encodeURIComponent(JSON.stringify(appList))));
        navigator.clipboard.writeText(base64Data).then(() => {
            alert(`База скопирована в буфер обмена! Сохрани её в Избранное ТГ.`);
        }).catch(err => {
            alert('Ошибка копирования. Вот твоя строка базы данных:\n\n' + base64Data);
        });
    });

    // ЛОГИКА ИМПОРТА (Восстанавливает из строки)
    importBtn.addEventListener('click', () => {
        const str = prompt('Вставь строку бэкапа из Избранного:');
        if (!str) return;
        try {
            const decodedData = decodeURIComponent(escape(atob(str.trim())));
            const parsed = JSON.parse(decodedData);
            if (Array.isArray(parsed)) {
                appList = parsed;
                selectedIds.clear();
                saveAndRefresh();
                alert('База успешно восстановлена!');
            } else {
                alert('Неверный формат бэкапа!');
            }
        } catch (e) {
            alert('Ошибка при расшифровке данных! Убедись, что скопировал строку полностью.');
        }
    });

    // КЛИКИ С КЛИК-ФЕЙДОМ
    listContainer.addEventListener('mousedown', (e) => {
        const linkWrapper = e.target.closest('.item-link-wrapper');
        if (linkWrapper) {
            const card = linkWrapper.closest('.item-card');
            if (card) {
                card.classList.remove('recently-clicked');
                void card.offsetWidth;
                card.classList.add('recently-clicked');
            }
        }
    });

    function renderList() {
        listContainer.innerHTML = '';
        const searchKeyword = searchBar.value.toLowerCase().trim();

        const filteredApps = appList.filter(app => {
            return (app.name.toLowerCase().includes(searchKeyword) ||
                    app.number.toLowerCase().includes(searchKeyword) ||
                    app.bundle.toLowerCase().includes(searchKeyword));
        });

        totalCountSpan.textContent = filteredApps.length;

        if (filteredApps.length === 0) {
            listContainer.innerHTML = '<div class="empty-mock">Список пуст или ничего не найдено</div>';
            updateBulkButtonsVisibility(filteredApps);
            return;
        }

        const displayedApps = [...filteredApps].reverse();

        displayedApps.forEach(app => {
            const isChecked = selectedIds.has(app.id);

            const card = document.createElement('div');
            card.className = 'item-card';
            card.innerHTML = `
                <label class="checkbox-container">
                    <input type="checkbox" class="item-checkbox" data-id="${app.id}" ${isChecked ? 'checked' : ''}>
                    <span class="custom-checkbox"></span>
                </label>
                
                <a href="https://play.google.com/store/apps/details?id=${app.bundle}" target="_blank" class="item-link-wrapper">
                    <span class="item-num">${app.number ? '#' + app.number : '#__'}</span>
                    <div class="item-text-center">
                        <span class="item-name">${app.name}</span>
                        <span class="item-bundle">${app.bundle || 'нет бандла'}</span>
                    </div>
                </a>
                
                <div class="item-actions">
                    <button class="action-btn btn-edit" onclick="editItem('${app.id}')">
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l10-10zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207 11.207 2.5zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293l6.5-6.5zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325z"/></svg>
                    </button>
                    <button class="action-btn btn-delete" onclick="deleteItem('${app.id}')">
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/><path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/></svg>
                    </button>
                </div>
            `;
            listContainer.appendChild(card);
        });

        updateBulkButtonsVisibility(filteredApps);
    }

    listContainer.addEventListener('change', (e) => {
        if (e.target.classList.contains('item-checkbox')) {
            const id = e.target.getAttribute('data-id');
            if (e.target.checked) {
                selectedIds.add(id);
            } else {
                selectedIds.delete(id);
            }
            const currentFilteredCount = appList.filter(app => {
                const keyword = searchBar.value.toLowerCase().trim();
                return app.name.toLowerCase().includes(keyword) || app.number.toLowerCase().includes(keyword) || app.bundle.toLowerCase().includes(keyword);
            });
            updateBulkButtonsVisibility(currentFilteredCount);
        }
    });

    function updateBulkButtonsVisibility(currentFilteredApps) {
        const selectedFilteredCount = currentFilteredApps.filter(app => selectedIds.has(app.id)).length;
        if (selectedFilteredCount > 0) {
            deleteSelectedBtn.style.display = 'block';
            deleteSelectedBtn.textContent = `Удалить выбранные (${selectedFilteredCount})`;
        } else {
            deleteSelectedBtn.style.display = 'none';
        }
    }

    deleteSelectedBtn.addEventListener('click', () => {
        if (confirm(`Удалить выбранные элементы (${selectedIds.size} шт.)?`)) {
            appList = appList.filter(app => !selectedIds.has(app.id));
            selectedIds.clear();
            saveAndRefresh();
        }
    });

    addBtn.addEventListener('click', () => {
        const name = appNameInput.value.trim();
        const number = appNumberInput.value.trim();
        const bundle = appBundleInput.value.trim();

        if (!name) {
            alert('Поле названия не должно быть пустым!');
            return;
        }
        if (!bundle) {
            alert('Поле бандла не должно быть пустым!');
            return;
        }

        const isDuplicateBundle = appList.some(app => app.bundle.toLowerCase() === bundle.toLowerCase() && app.id !== editingId);
        if (isDuplicateBundle) {
            alert(`Ошибка: Приложение с бандлом "${bundle}" уже добавлено в список!`);
            return;
        }

        if (editingId) {
            appList = appList.map(app => app.id === editingId ? { ...app, name, number, bundle } : app);
            editingId = null;
            addBtn.textContent = 'Добавить в список';
            addBtn.style.backgroundColor = '#2481cc';
        } else {
            const newApp = {
                id: Date.now().toString(),
                name,
                number,
                bundle
            };
            appList.push(newApp);
        }

        appNameInput.value = '';
        appNumberInput.value = '';
        appBundleInput.value = '';
        saveAndRefresh();
    });

    window.editItem = function(id) {
        const item = appList.find(app => app.id === id);
        if (item) {
            appNameInput.value = item.name;
            appNumberInput.value = item.number;
            appBundleInput.value = item.bundle;
            editingId = id;
            addBtn.textContent = 'Сохранить изменения';
            addBtn.style.backgroundColor = '#e5a93c';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    };

    window.deleteItem = function(id) {
        appList = appList.filter(app => app.id !== id);
        selectedIds.delete(id);
        if (editingId === id) {
            editingId = null;
            addBtn.textContent = 'Добавить в список';
            addBtn.style.backgroundColor = '#2481cc';
            appNameInput.value = '';
            appNumberInput.value = '';
            appBundleInput.value = '';
        }
        saveAndRefresh();
    };

    searchBar.addEventListener('input', renderList);

    function saveAndRefresh() {
        localStorage.setItem('moderation_apps', JSON.stringify(appList));
        renderList();
    }

    renderList();
</script>

</body>
</html>
